experiment:
  name: minimal_setup_CTL
  description: "Control run — minimal POEM setup"

# ── Data paths ───────────────────────────────────────────────────────────────
data:
  history_dir: /p/projects/poem/tienyiao/projects/POEM_playground/test_minimal_setup/minimal_setup_CTL/history

  # Inclusive model-year range to load. Epochs outside this range are
  # ignored. Omit (or set to null) to load all epochs in history_dir.
  year_range: [19, 23]

  # POEM component files: {epoch}.{component}.nc
  # Epochs are discovered automatically by scanning history_dir.
  components:
    atmos_month:
      pattern: "{epoch}.atmos_month.nc"
      decode_timedelta: false
    ocean_month:
      pattern: "{epoch}.ocean_month.nc"
      decode_timedelta: false
    ocean_scalar:
      pattern: "{epoch}.ocean_scalar.nc"
      decode_timedelta: false
    ice_month:
      pattern: "{epoch}.ice_month.nc"
      decode_timedelta: false
    land_month:
      pattern: "{epoch}.land_month.nc"
      decode_timedelta: false

  # LPJ-mL: one NetCDF file per variable, in per-epoch subdirectories.
  # All lpjml files must be opened with decode_times=False because the
  # time units ("years since 1901-1-1") cannot be decoded by cftime.
  lpjml:
    subdir_pattern: "lpjml_{epoch}"
    decode_times: false

    # Variables whose time axis packs N levels × N_time steps.
    # The loader reshapes these to (time, <dim_name>, lat, lon).
    packed_vars:
      msoiltemp:
        n_levels: 6
        dim_name: soil_layer
      soilc_layer:
        n_levels: 5
        dim_name: soil_layer
      cftfrac:
        n_levels: 2
        dim_name: pft
      pft_harvest_pft:
        n_levels: 32
        dim_name: pft

# ── Grid metadata ─────────────────────────────────────────────────────────────
grids:
  atmos:
    lat: lat
    lon: lon
    projection: PlateCarree

  ocean:
    # Ocean uses 2-D geographic coordinate arrays on a tripolar grid.
    lat: geolat_t
    lon: geolon_t
    projection: PlateCarree

  ice:
    lat: GEOLAT
    lon: GEOLON
    projection: PlateCarree

  lpjml:
    lat: lat
    lon: lon
    projection: PlateCarree
    mask_var: grid       # grid.nc — nonzero = active land cell
    area_var: terr_area  # terr_area.nc — for area-weighted global means

# ── Diagnostics ───────────────────────────────────────────────────────────────
# Two-layer structure: component → diag_type → settings.
# CLI selects any combination via --components and --diag-types.
diagnostics:
  atmos:
    map_2d:
      vars: [t_ref, precip, slp, olr, swdn_toa, netrad_toa, t_surf]
    timeseries:
      # Area-weighted global-mean time series from atmos_month.
      vars: [t_ref, precip, olr]

  ocean:
    map_2d:
      vars: [sst, sss, mld, swflx, lw_heat, sens_heat, evap_heat]
    zonal_section:
      # Variables with a vertical (st_ocean) dimension.
      vars: [temp, salt]
    timeseries:
      # Pre-integrated global quantities from ocean_scalar.nc.
      vars: [mass_total, salt_total, temp_total, ke_tot]

  ice:
    map_2d:
      vars: [CN, HI, EXT]
      # Produce a separate figure for each hemisphere.
      regions: [NH, SH]

  land:
    map_2d:
      # Monthly-frequency LPJ-mL variables, grouped by theme.
      monthly_vars:
        carbon:   [mgpp, mnpp, mrh]
        water:    [mevap, mrunoff, mdischarge, mpet]
        surface:  [malbedo, soil_surf_temp, mswc1, mswc2, swe]
        fire:     [mburnt_area, mnfire]
      # Annual-frequency LPJ-mL variables.
      annual_vars:
        carbon:   [agb, vegc, soilc, litc, firec]
    zonal_section:
      # Packed soil-layer variables — produce latitude-depth profiles.
      vars: [msoiltemp, soilc_layer]

# ── Output ────────────────────────────────────────────────────────────────────
output:
  base_dir: ./output
  # Final path: {base_dir}/{experiment.name}/{mode}/{component}/{diag_type}/{variable}.png
  format: png
  dpi: 150
